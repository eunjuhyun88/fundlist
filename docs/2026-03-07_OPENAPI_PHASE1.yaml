openapi: 3.1.0
info:
  title: Fundlist Internal Ops API
  version: 0.1.0
  summary: Internal API for verified opportunities, changefeed, tasks, scans, and briefs
servers:
  - url: http://127.0.0.1:8787
security:
  - bearerAuth: []
tags:
  - name: health
  - name: opportunities
  - name: changes
  - name: tasks
  - name: scans
  - name: briefs
paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  version:
                    type: string
                  db_path:
                    type: string
                required: [ok, service, version]
  /opportunities:
    get:
      tags: [opportunities]
      summary: List verified opportunities
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, rolling, deadline, closed, unknown]
        - in: query
          name: min_score
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: min_priority_score
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: deadline_to
          schema:
            type: string
            format: date
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Opportunity list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Opportunity'
                  next_cursor:
                    type: string
                  has_more:
                    type: boolean
                required: [items, has_more]
  /opportunities/{fingerprint}:
    get:
      tags: [opportunities]
      summary: Get a verified opportunity by fingerprint
      parameters:
        - in: path
          name: fingerprint
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Opportunity detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /changes:
    get:
      tags: [changes]
      summary: List recent opportunity changes
      parameters:
        - in: query
          name: change_type
          schema:
            type: string
            enum:
              - new_opportunity
              - status_changed
              - deadline_changed
              - submission_url_changed
              - source_url_changed
              - reopened
        - in: query
          name: since
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Changefeed
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OpportunityChange'
                required: [items]
  /tasks:
    get:
      tags: [tasks]
      summary: List submission tasks
      parameters:
        - in: query
          name: submission_state
          schema:
            $ref: '#/components/schemas/SubmissionState'
        - in: query
          name: bucket
          schema:
            type: string
            enum: [ready, submitted, followup, blocked, active, today, this_week, closed]
        - in: query
          name: owner
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SubmissionTask'
                required: [items]
    post:
      tags: [tasks]
      summary: Create a submission task from an opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionTask'
        '400':
          $ref: '#/components/responses/BadRequest'
  /tasks/{task_id}:
    patch:
      tags: [tasks]
      summary: Update a submission task
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionTask'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /tasks/{task_id}/submitted:
    post:
      tags: [tasks]
      summary: Mark a submission task as submitted
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                submitted_at:
                  type: string
                  format: date-time
                follow_up_days:
                  type: integer
                  minimum: 1
                  default: 14
                note:
                  type: string
      responses:
        '200':
          description: Task submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionTask'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /scans/full:
    post:
      tags: [scans]
      summary: Trigger a full verification scan
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                max_sites:
                  type: integer
                max_pages_per_site:
                  type: integer
                skip_search:
                  type: boolean
      responses:
        '202':
          description: Full scan accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
  /scans/delta:
    post:
      tags: [scans]
      summary: Trigger a delta verification scan
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                seed_urls:
                  type: array
                  items:
                    type: string
      responses:
        '202':
          description: Delta scan accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
  /briefs/latest:
    get:
      tags: [briefs]
      summary: Get latest daily brief
      parameters:
        - in: query
          name: kind
          schema:
            type: string
            enum: [morning, evening]
            default: morning
      responses:
        '200':
          description: Latest brief
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brief'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
          required: [code, message]
      required: [error]
    SubmissionState:
      type: string
      enum:
        - not_started
        - researching
        - drafting
        - waiting_assets
        - ready_to_submit
        - submitted
        - follow_up_due
        - won
        - rejected
        - archived
    OpportunityFacts:
      type: object
      properties:
        fingerprint:
          type: string
        org_name:
          type: string
        org_type:
          type: string
        domain:
          type: string
        official_page:
          type: string
        submission_url:
          type: string
        submission_type:
          type: string
        status:
          type: string
        deadline_text:
          type: string
        deadline_date:
          type: string
          format: date
        requirements:
          type: string
        evidence:
          type: string
        source_page_snapshot:
          type: string
        score:
          type: integer
        verified_at:
          type: string
          format: date-time
      required:
        - fingerprint
        - org_name
        - domain
        - official_page
        - submission_url
        - status
    OpportunityInference:
      type: object
      properties:
        priority_score:
          type: integer
        priority_reason:
          type: string
        fit_score:
          type: integer
        trust_score:
          type: integer
        urgency_score:
          type: integer
        readiness_score:
          type: integer
    Opportunity:
      type: object
      properties:
        facts:
          $ref: '#/components/schemas/OpportunityFacts'
        inference:
          $ref: '#/components/schemas/OpportunityInference'
      required: [facts]
    OpportunityDetail:
      allOf:
        - $ref: '#/components/schemas/Opportunity'
        - type: object
          properties:
            recent_changes:
              type: array
              items:
                $ref: '#/components/schemas/OpportunityChange'
            linked_tasks:
              type: array
              items:
                $ref: '#/components/schemas/SubmissionTask'
    OpportunityChange:
      type: object
      properties:
        fingerprint:
          type: string
        org_name:
          type: string
        change_type:
          type: string
        old_value:
          type: string
        new_value:
          type: string
        source_url:
          type: string
        submission_url:
          type: string
        detected_at:
          type: string
          format: date-time
      required:
        - fingerprint
        - change_type
        - detected_at
    SubmissionTask:
      type: object
      properties:
        id:
          type: integer
        opportunity_fingerprint:
          type: string
        org_name:
          type: string
        submission_state:
          $ref: '#/components/schemas/SubmissionState'
        owner:
          type: string
        due_date:
          type: string
          format: date
        submitted_at:
          type: string
          format: date-time
        follow_up_due_at:
          type: string
          format: date
        priority_score:
          type: integer
        fit_score:
          type: integer
        recommended_action:
          type: string
        notes:
          type: string
        official_page:
          type: string
        submission_url:
          type: string
        opportunity_status:
          type: string
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - opportunity_fingerprint
        - org_name
        - submission_state
    CreateTaskRequest:
      type: object
      properties:
        fingerprint:
          type: string
        query:
          type: string
        owner:
          type: string
        due_date:
          type: string
          format: date
        submission_state:
          $ref: '#/components/schemas/SubmissionState'
        notes:
          type: string
      oneOf:
        - required: [fingerprint]
        - required: [query]
    UpdateTaskRequest:
      type: object
      properties:
        submission_state:
          $ref: '#/components/schemas/SubmissionState'
        owner:
          type: string
        due_date:
          type: string
          format: date
        notes:
          type: string
        recommended_action:
          type: string
    Brief:
      type: object
      properties:
        kind:
          type: string
          enum: [morning, evening]
        generated_at:
          type: string
          format: date-time
        markdown_body:
          type: string
      required: [kind, generated_at, markdown_body]
    JobResponse:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
        job_type:
          type: string
      required: [job_id, status, job_type]
