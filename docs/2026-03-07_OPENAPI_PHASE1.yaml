openapi: 3.1.0
info:
  title: Fundlist Internal Ops API
  version: 0.1.0
  summary: Dependency-free internal API for verified opportunities, review queue, tasks, scans, and briefs
servers:
  - url: http://127.0.0.1:8787
security:
  - bearerAuth: []
tags:
  - name: health
  - name: opportunities
  - name: changes
  - name: review
  - name: tasks
  - name: scans
  - name: briefs
paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/opportunities:
    get:
      tags: [opportunities]
      summary: List verified opportunities
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, rolling, deadline, closed, unknown]
        - in: query
          name: org_type
          schema:
            type: string
        - in: query
          name: min_score
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 80
      responses:
        '200':
          description: Opportunity list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityListResponse'
  /v1/opportunities/{fingerprint}:
    get:
      tags: [opportunities]
      summary: Get a verified opportunity by fingerprint
      parameters:
        - in: path
          name: fingerprint
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Opportunity detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [opportunities]
      summary: Manually override a reviewed opportunity
      parameters:
        - in: path
          name: fingerprint
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOpportunityRequest'
      responses:
        '200':
          description: Opportunity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/changes:
    get:
      tags: [changes]
      summary: List recent structured opportunity changes
      parameters:
        - in: query
          name: change_type
          schema:
            type: string
            enum: [new_opportunity, status_changed, deadline_changed, submission_url_changed, source_url_changed, reopened]
        - in: query
          name: since
          schema:
            type: string
            format: date-time
        - in: query
          name: since_days
          schema:
            type: integer
            minimum: 0
            maximum: 365
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        '200':
          description: Changefeed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeListResponse'
  /v1/review-queue:
    get:
      tags: [review]
      summary: List failures and uncertain targets needing manual review
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 40
      responses:
        '200':
          description: Review queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewQueueResponse'
  /v1/tasks:
    get:
      tags: [tasks]
      summary: List submission tasks
      parameters:
        - in: query
          name: workspace_key
          schema:
            type: string
            default: default
        - in: query
          name: submission_state
          schema:
            $ref: '#/components/schemas/SubmissionState'
        - in: query
          name: bucket
          schema:
            type: string
            enum: [ready, submitted, followup, blocked, active, today, this_week, closed]
        - in: query
          name: owner
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 40
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
    post:
      tags: [tasks]
      summary: Create a submission task from an opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '200':
          description: Existing task returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskResponse'
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tasks/{task_id}:
    patch:
      tags: [tasks]
      summary: Update a submission task
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tasks/{task_id}/submitted:
    post:
      tags: [tasks]
      summary: Mark a task as submitted
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                submitted_at:
                  type: string
                  format: date-time
                follow_up_days:
                  type: integer
                  minimum: 1
                  maximum: 365
                note:
                  type: string
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/scans/full:
    post:
      tags: [scans]
      summary: Run a synchronous authoritative sweep
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRequest'
      responses:
        '200':
          description: Scan completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/scans/delta:
    post:
      tags: [scans]
      summary: Run a synchronous partial scan
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRequest'
      responses:
        '200':
          description: Scan completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/scans/review-retry:
    post:
      tags: [scans]
      summary: Retry unknown or uncertain reviewed targets only
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRequest'
      responses:
        '200':
          description: Review retry scan completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/scans/fallback:
    post:
      tags: [scans]
      summary: Retry failed seeds with search and AI-assisted candidate selection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                seed_urls:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                ai_provider:
                  type: string
                  enum: [auto, groq, gemini, huggingface, openrouter]
                model:
                  type: string
                max_results_per_query:
                  type: integer
                max_candidates:
                  type: integer
                max_candidate_scan:
                  type: integer
                max_pages_per_site:
                  type: integer
                http_timeout:
                  type: integer
                min_score:
                  type: integer
                report_limit:
                  type: integer
                event_limit:
                  type: integer
                status_filter:
                  type: string
                org_type_filter:
                  type: string
                output:
                  type: string
                json_output:
                  type: string
                refresh_submission_report:
                  type: string
                refresh_submission_json:
                  type: string
      responses:
        '200':
          description: Fallback scan completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/briefs/latest:
    get:
      tags: [briefs]
      summary: Return the latest generated reports
      responses:
        '200':
          description: Latest brief bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BriefLatestResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        message:
          type: string
      required: [ok, error, message]
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        service:
          type: string
        version:
          type: string
        db_path:
          type: string
        time:
          type: string
          format: date-time
      required: [ok, service, version, db_path, time]
    OpportunityRow:
      type: object
      properties:
        id:
          type: integer
        org_name:
          type: string
        org_type:
          type: string
        domain:
          type: string
        source_url:
          type: string
        submission_url:
          type: string
        submission_type:
          type: string
          enum: [form, email, intro-only, unknown]
        fingerprint:
          type: string
        status:
          type: string
          enum: [open, rolling, deadline, closed, unknown]
        requirements:
          type: string
        notes:
          type: string
        evidence:
          type: string
        source_page_snapshot:
          type: string
        deadline_text:
          type: string
        deadline_date:
          type: string
          format: date
        score:
          type: integer
        discovered_at:
          type: string
          format: date-time
        last_checked_at:
          type: string
          format: date-time
      required: [org_name, domain, source_url, submission_url, submission_type, fingerprint, status, score]
    OpportunityListResponse:
      type: object
      properties:
        ok:
          type: boolean
        count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/OpportunityRow'
      required: [ok, count, items]
    OpportunityItemResponse:
      type: object
      properties:
        ok:
          type: boolean
        item:
          $ref: '#/components/schemas/OpportunityRow'
      required: [ok, item]
    OpportunityChange:
      type: object
      properties:
        id:
          type: integer
        fingerprint:
          type: string
        org_name:
          type: string
        domain:
          type: string
        change_type:
          type: string
          enum: [new_opportunity, status_changed, deadline_changed, submission_url_changed, source_url_changed, reopened]
        old_value:
          type: string
        new_value:
          type: string
        source_url:
          type: string
        submission_url:
          type: string
        detected_at:
          type: string
          format: date-time
      required: [fingerprint, org_name, change_type, detected_at]
    ChangeListResponse:
      type: object
      properties:
        ok:
          type: boolean
        count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/OpportunityChange'
      required: [ok, count, items]
    ReviewQueueItem:
      type: object
      properties:
        ref:
          type: string
        queue_type:
          type: string
        review_reason:
          type: string
        org_name:
          type: string
        status:
          type: string
        priority_score:
          type: integer
        official_page:
          type: string
        submission_url:
          type: string
        seed_source:
          type: string
        error_type:
          type: string
        error_message:
          type: string
        last_seen_at:
          type: string
      required: [ref, queue_type, review_reason, org_name, status]
    ReviewQueueResponse:
      type: object
      properties:
        ok:
          type: boolean
        count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewQueueItem'
      required: [ok, count, items]
    SubmissionState:
      type: string
      enum: [not_started, researching, drafting, waiting_assets, ready_to_submit, submitted, follow_up_due, won, rejected, archived]
    SubmissionTask:
      type: object
      properties:
        id:
          type: integer
        workspace_key:
          type: string
        opportunity_fingerprint:
          type: string
        org_name:
          type: string
        domain:
          type: string
        official_page:
          type: string
        submission_url:
          type: string
        opportunity_status:
          type: string
        submission_state:
          $ref: '#/components/schemas/SubmissionState'
        owner:
          type: string
        due_date:
          type: string
          format: date
        submitted_at:
          type: string
          format: date-time
        follow_up_due_at:
          type: string
          format: date
        priority_score:
          type: integer
        recommended_action:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, opportunity_fingerprint, org_name, submission_state]
    TaskListResponse:
      type: object
      properties:
        ok:
          type: boolean
        count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/SubmissionTask'
      required: [ok, count, items]
    TaskResponse:
      type: object
      properties:
        ok:
          type: boolean
        task:
          $ref: '#/components/schemas/SubmissionTask'
      required: [ok, task]
    CreateTaskResponse:
      type: object
      properties:
        ok:
          type: boolean
        created:
          type: boolean
        task:
          $ref: '#/components/schemas/SubmissionTask'
      required: [ok, created, task]
    CreateTaskRequest:
      type: object
      properties:
        target:
          type: string
        target_query:
          type: string
        workspace_key:
          type: string
        owner:
          type: string
        due_date:
          type: string
          format: date
        submission_state:
          $ref: '#/components/schemas/SubmissionState'
        notes:
          type: string
      anyOf:
        - required: [target]
        - required: [target_query]
    UpdateTaskRequest:
      type: object
      properties:
        submission_state:
          $ref: '#/components/schemas/SubmissionState'
        owner:
          type: string
        due_date:
          type: string
          format: date
        notes:
          type: string
        recommended_action:
          type: string
    UpdateOpportunityRequest:
      type: object
      properties:
        org_name:
          type: string
        org_type:
          type: string
        source_url:
          type: string
        submission_url:
          type: string
        submission_type:
          type: string
          enum: [form, email, intro-only, unknown]
        status:
          type: string
          enum: [open, rolling, deadline, closed, unknown]
        requirements:
          type: string
        notes:
          type: string
        evidence:
          type: string
        deadline_text:
          type: string
        deadline_date:
          type: string
          format: date
        score:
          type: integer
          minimum: 0
    ScanRequest:
      type: object
      properties:
        seed_urls:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        query:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        queries:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        skip_search:
          type: boolean
        from_fundraise:
          type: boolean
        review_targets:
          type: boolean
        review_targets_only:
          type: boolean
        prune_domains:
          type: boolean
        review_target_limit:
          type: integer
        fundraise_seed_limit:
          type: integer
        max_results_per_query:
          type: integer
        max_sites:
          type: integer
        max_pages_per_site:
          type: integer
        http_timeout:
          type: integer
        query_file:
          type: string
        sector:
          type: string
        stage:
          type: string
        region:
          type: string
        status_filter:
          type: string
        org_type_filter:
          type: string
        json_output:
          type: string
        output:
          type: string
        report_limit:
          type: integer
        min_score:
          type: integer
        event_limit:
          type: integer
    ScanResponse:
      type: object
      properties:
        ok:
          type: boolean
        scan_type:
          type: string
          enum: [full, delta, review_retry, fallback]
        returncode:
          type: integer
        stdout:
          type: string
        stderr:
          type: string
        command:
          type: array
          items:
            type: string
      required: [ok, scan_type, returncode, stdout, stderr, command]
    BriefLatestResponse:
      type: object
      properties:
        ok:
          type: boolean
        generated_at:
          type: string
          format: date-time
        ops_report_path:
          type: string
        submission_report_path:
          type: string
        submission_json_path:
          type: string
        ops_report:
          type: string
        submission_report:
          type: string
        submission_json:
          type: string
      required: [ok, generated_at, ops_report_path, submission_report_path, submission_json_path, ops_report, submission_report, submission_json]
